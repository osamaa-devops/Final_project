image: node:18-alpine

stages:
  - test
  - build
  - deploy

variables:
  NPM_CACHE_FOLDER: .npm

cache:
  paths:
    - .npm
    - node_modules

test:
  stage: test
  script:
    - npm ci
    - npm test
    - npm run coverage
  artifacts:
    reports:
      junit: test-results.xml
    paths:
      - coverage/
      - test-results.xml
    expire_in: 30 days
  coverage: '/^Statements\s*:\s*(\d+\.?\d*)%/'

build_docker:
  image: docker:latest
  stage: build
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA -t $CI_REGISTRY_IMAGE:latest .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
    - docker push $CI_REGISTRY_IMAGE:latest
  only:
    - main

deploy_staging:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache curl kubectl
  script:
    - echo "Deploying to staging..."
    - kubectl config use-context your-staging-cluster
    - kubectl set image deployment/solar-system solar-system=$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA -n staging
  environment:
    name: staging
    kubernetes:
      namespace: staging
  only:
    - main
  when: manual

deploy_production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache curl kubectl
  script:
    - echo "Deploying to production..."
    - kubectl config use-context your-production-cluster
    - kubectl set image deployment/solar-system solar-system=$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA -n production
  environment:
    name: production
    kubernetes:
      namespace: production
  only:
    - main
  when: manual
