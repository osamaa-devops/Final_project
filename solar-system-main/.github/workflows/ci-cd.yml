name: EKS CI-CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  K8S_NAMESPACE: production

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run coverage
        run: npm run coverage

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_uri: ${{ steps.image.outputs.image_uri }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Install envsubst
        run: sudo apt-get update && sudo apt-get install -y gettext-base

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"

      - name: Create namespace and MongoDB secret
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          MONGO_USERNAME: ${{ secrets.MONGO_USERNAME }}
          MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
        run: |
          kubectl create namespace "$K8S_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic mongo-db-creds \
            --namespace "$K8S_NAMESPACE" \
            --from-literal=MONGO_URI="$MONGO_URI" \
            --from-literal=MONGO_USERNAME="$MONGO_USERNAME" \
            --from-literal=MONGO_PASSWORD="$MONGO_PASSWORD" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Render Kubernetes manifests
        env:
          NAMESPACE: production
          REPLICAS: 2
          K8S_IMAGE: ${{ needs.build-and-push.outputs.image_uri }}
        run: |
          mkdir -p rendered
          for file in kubernetes/production/*.yaml; do
            envsubst < "$file" > "rendered/$(basename "$file")"
          done

      - name: Deploy to EKS
        run: kubectl apply -f rendered

      - name: Wait for rollout
        run: kubectl rollout status deployment/solar-system -n "$K8S_NAMESPACE" --timeout=180s

      - name: Show LoadBalancer URL
        run: |
          echo "Waiting for external hostname..."
          for i in {1..30}; do
            HOSTNAME=$(kubectl get svc solar-system -n "$K8S_NAMESPACE" -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
            if [ -z "$HOSTNAME" ]; then
              HOSTNAME=$(kubectl get svc solar-system -n "$K8S_NAMESPACE" -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
            fi
            if [ -n "$HOSTNAME" ]; then
              break
            fi
            sleep 10
          done
          echo "LoadBalancer endpoint: http://$HOSTNAME"
          echo "## LoadBalancer endpoint" >> "$GITHUB_STEP_SUMMARY"
          echo "http://$HOSTNAME" >> "$GITHUB_STEP_SUMMARY"
